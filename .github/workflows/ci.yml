name: CI

# Compiles SwiftGog and runs the Phase-0 wiring tests. SwiftGog depends on a
# sibling SwiftBash checkout (Package.swift uses `.package(path: "../SwiftBash")`),
# so this workflow checks out PicoMLX/SwiftBash alongside it.
#
# Runner mirrors SwiftBash's own `build-macos` job: macos-latest + Xcode 26.0
# (Swift 6.2). macOS avoids the Linux system-lib / JavaScriptCore setup that
# BashCommandKit's SwiftPorts closure (libgit2 + compression + ripgrep) needs,
# and matches the iOS/macOS deploy target.

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout SwiftGog
        uses: actions/checkout@v4
        with:
          path: SwiftGog

      # If PicoMLX/SwiftBash is private and the default GITHUB_TOKEN lacks
      # cross-repo read, add a PAT (repo scope) as the secret
      # SWIFTBASH_CHECKOUT_TOKEN. Pin `ref` to a tag/SHA for reproducibility
      # once SwiftGog targets a released SwiftBash.
      - name: Checkout SwiftBash (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: PicoMLX/SwiftBash
          ref: main
          path: SwiftBash
          token: ${{ secrets.SWIFTBASH_CHECKOUT_TOKEN || github.token }}

      - name: Select Xcode 26.0 (Swift 6.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Swift version
        run: swift --version

      # Critical contract: command/client code must route file I/O through
      # Shell.bashCurrent.fileSystem and HTTP through SecureFetcher. These APIs
      # would bypass the sandbox, so fail the build if they appear.
      - name: Sandbox lint guard
        working-directory: SwiftGog
        run: |
          if grep -rnE 'FileManager|Data\(contentsOf:|URLSession' Sources/GogCore Sources/GogCommands; then
            echo "::error::Forbidden API in GogCore/GogCommands — use Shell.bashCurrent.fileSystem / SecureFetcher (see PLAN.md Critical contracts)."
            exit 1
          fi

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: SwiftGog/.build
          key: spm-${{ runner.os }}-${{ hashFiles('SwiftGog/Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build (including tests)
        working-directory: SwiftGog
        run: swift build --build-tests -v

      - name: Test
        working-directory: SwiftGog
        run: swift test --skip-build
